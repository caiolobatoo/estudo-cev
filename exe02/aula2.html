<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Páragrafos e quebras de linha</h1>
    <hr>
    <p>voce pode escrever um paragrafo de 
        qualquer jeio basta por tudo no 
        meio de tag &lt;p&gt; e &lt;/p&gt;</p>
    <p> se voce quer quebrar <br>as linhas basta 
        por a tag &lt;br&gt;
    </p>
    <p>Vamos adicionar alguns simboloso: <br>
        &reg; <br>
        &copy; <br>
        &trade; <br>
        &euro; <br>
        &pound; <br>
        &yen; <br>
        &cent; <br>
        &Delta; <br>
        &uparrow; <br>

    </p>
    <p>Vamos adicionar alguns emoji: <br>
        &#x1F601; <br>
        &#x1F913; <br>
    </p>
</body>
</html>
