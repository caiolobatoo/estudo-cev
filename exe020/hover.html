<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo de hover</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        div>p{
            display: none;
        }
        div:hover>p{
            display: block;
            color: white;
            background-color: red;
            width: 300px;
            border-radius: 50px;
            text-align: center;
        }
        div:hover{
            color: red;
        }
    </style>
</head>
<body>
    <h1>exempo de hover</h1>
    <p>passe o mouse sob o texto a abaixo</p>
    <div>
        passe o mouse aqui 
        <p>TEXTO ESCONDIDO....</p>
    </div>
 <p>fim do exemplo!</p>
</body>
</html>
